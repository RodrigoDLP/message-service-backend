version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres_payments
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: payments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./main/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: .
    container_name: api_payments
    restart: always
    command: uvicorn main.api:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - rabbitmq

  receiver:
    build: .
    container_name: api_receiver
    restart: always
    command: python -m main.api_receiver
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
    depends_on:
      - postgres
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_broker
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  tests:
    build: .
    container_name: api_tests
    command: pytest --cov=main --cov-report=xml:coverage.xml --cov-config=.coveragerc --cov-report=term tests/
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
    depends_on:
      - postgres
      - rabbitmq
      - api
      - receiver
    volumes:
      - .:/app
      - ./coverage.xml:/app/coverage.xml

volumes:
  postgres_data:
